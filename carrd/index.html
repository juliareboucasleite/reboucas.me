<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="leeksxy — art commissions, Roblox maps, clothing packs, and frontend projects. Cute & aesthetic content.">
  <meta property="og:title" content="leeksxy — Commissions & Projects">
  <meta property="og:description"
    content="Open commissions: cute frontend, Roblox maps, and clothing packs. Check the schedule and reserve your slot.">
  <meta property="og:type" content="website">
  <title>Commissions &amp; Projects</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="main-content" class="main-content" tabindex="-1">
    <div class="name-banner">
      <h1 class="name-banner__text">Commissions &amp; Projects</h1>
    </div>

    <div class="scroll-nav-wrap">
      <div id="scroll-area" class="scroll-area">
        <div class="columns">

          <aside class="column column--about">
            <div class="block block--tall block--about">
              <h2 class="block__title block__title--about" data-mount-title="about">About</h2>
              <div data-mount="about"></div>
            </div>
          </aside>

          <aside class="column column--career">
            <div class="block block--tall">
              <h2 class="block__title" data-mount-title="schedule">Schedule</h2>
              <div data-mount="schedule"></div>
            </div>
          </aside>

          <aside class="column column--content column--work">
            <div class="block block--work">
              <h2 class="block__title block__title--work" data-mount-title="commissions">Commission types</h2>
              <div data-mount="commissions"></div>
            </div>
          </aside>

          <aside class="column column--content column--side">
            <div class="block block--tall">
              <h2 class="block__title" data-mount-title="projects">Works &amp; projects</h2>
              <div data-mount="projects"></div>
            </div>
          </aside>

          <aside class="column column--content column--ideas">
            <div class="block block--tall">
              <h2 class="block__title" data-mount-title="ideas">Ideas I'm exploring</h2>
              <div data-mount="ideas"></div>
            </div>
          </aside>

        </div>
      </div>
    </div>
  </div>

  <div class="top-controls" role="group" aria-label="Navigation">
    <button type="button" class="scroll-nav-btn scroll-nav-btn--prev" id="scroll-prev" aria-label="Previous column">
      <span class="scroll-nav-btn__icon" aria-hidden="true">‹</span>
    </button>
    <button type="button" class="scroll-nav-btn scroll-nav-btn--next" id="scroll-next" aria-label="Next column">
      <span class="scroll-nav-btn__icon" aria-hidden="true">›</span>
    </button>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
