<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar · Pawshop</title>
    <base href="__BASE_PATH__/" />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link rel="stylesheet" href="styles/style.css" />
    <script>
      (function () {
        try {
          if (localStorage.getItem('pawshop-theme') === 'dark') {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="centro">
    <button class="theme-toggle theme-toggle--floating" id="theme-toggle" type="button" aria-label="Alternar tema claro/escuro">
      <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
    </button>

    <main class="login">
      <div class="login__paw" aria-hidden="true"></div>
      <h1>Entrar no <em>painel</em></h1>
      <p>
        Acesso restrito à staff. Faça login com sua conta do Discord —
        apenas administradores autorizados conseguem entrar.
      </p>
      <a class="botao" href="auth/login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127c-.598.35-1.22.642-1.873.891a.077.077 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Entrar com Discord
      </a>
      <p class="voltar"><a href=".">← voltar para o portfolio</a></p>
    </main>

    <script>
      (function () {
        const root = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', () => {
          const escuro = root.dataset.theme === 'dark';
          if (escuro) {
            delete root.dataset.theme;
            localStorage.setItem('pawshop-theme', 'light');
          } else {
            root.dataset.theme = 'dark';
            localStorage.setItem('pawshop-theme', 'dark');
          }
        });
      })();
    </script>
  </body>
</html>
